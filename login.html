<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlasRad | Connexion Espace Clinique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy:   #0B1E3D;
            --navy2:  #0D2448;
            --blue:   #1A6FA8;
            --blue2:  #2490D4;
            --gold:   #C5922A;
            --gold2:  #E8B856;
            --cyan:   #00C8FF;
            --text:   #E8EDF5;
            --muted:  #7A99BB;
        }

        body {
            margin: 0;
            background: #040D1A;
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Deep space background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(11,45,94,0.7) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(26,111,168,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 30% 30% at 80% 70%, rgba(197,146,42,0.08) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* Tech grid overlay */
        .ar-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(26,111,168,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,111,168,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            animation: gridShift 30s linear infinite;
            pointer-events: none;
        }

        @keyframes gridShift {
            from { background-position: 0 0; }
            to   { background-position: 60px 60px; }
        }

        /* login glass card */
        .glass-card {
            background: rgba(11, 30, 61, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(197, 146, 42, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px -10px rgba(26, 111, 168, 0.3);
            position: relative;
            z-index: 10;
        }

        /* inputs */
        .ar-input {
            background: rgba(4, 13, 26, 0.6);
            border: 1px solid rgba(122, 153, 187, 0.3);
            color: var(--text);
            transition: all 0.3s ease;
        }
        .ar-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(197, 146, 42, 0.2);
            background: rgba(4, 13, 26, 0.8);
        }

        /* btn */
        .ar-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
            color: #040D1A;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .ar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(197,146,42,0.35);
        }

        .ar-logo-svg {
            filter: drop-shadow(0 0 12px rgba(26,111,168,0.4));
            animation: rotateSlow 40s linear infinite;
        }
        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="ar-grid"></div>

    <div class="w-full max-w-md px-6">
        <!-- Back to home -->
        <a href="index.html" class="inline-flex items-center gap-2 text-sm text-[#7A99BB] hover:text-[#C5922A] transition-colors mb-8 relative z-20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Retour au site public
        </a>

        <!-- Main Card -->
        <div class="glass-card rounded-2xl p-8 sm:p-10 w-full animate-[fadeUp_0.8s_ease_both]">
            
            <!-- Logo area -->
            <div class="flex flex-col items-center mb-8">
                <svg class="ar-logo-svg w-20 h-20 mb-4" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- 12pt Moroccan star outer -->
                    <polygon points="100,14 106,38 124,22 118,46 140,36 130,58 154,54 140,72 164,76 146,88 168,100 146,112 164,124 140,128 154,146 130,142 140,164 118,154 124,178 106,162 100,186 94,162 76,178 82,154 60,164 70,142 46,146 60,128 36,124 54,112 32,100 54,88 36,76 60,72 46,54 70,58 60,36 82,46 76,22 94,38" fill="none" stroke="#C5922A" stroke-width="2"/>
                    <!-- Globe outer ring -->
                    <circle cx="100" cy="100" r="58" fill="none" stroke="#1A6FA8" stroke-width="2.5"/>
                    <ellipse cx="100" cy="100" rx="32" ry="58" fill="none" stroke="#2490D4" stroke-width="1.8"/>
                    <ellipse cx="100" cy="100" rx="58" ry="20" fill="none" stroke="#2490D4" stroke-width="1.5"/>
                </svg>
                <h1 class="font-['Rajdhani'] text-3xl font-bold tracking-widest text-[#E8EDF5]">ATLAS<span class="text-[#C5922A]">RAD</span></h1>
                <p class="text-xs tracking-[4px] text-[#00C8FF] uppercase mt-1 font-['Rajdhani']">Clinician Portal</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-[#7A99BB] uppercase tracking-wider mb-2">Identifiant Institutionnel</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="email" id="emailInput" required placeholder="sabir@atlasrad.com" class="ar-input w-full pl-10 pr-4 py-3 rounded-lg text-sm sm:text-base">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-semibold text-[#7A99BB] uppercase tracking-wider">Mot de passe</label>
                        <a href="#" class="text-xs text-[#1A6FA8] hover:text-[#00C8FF] transition-colors">Oublié ?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="passwordInput" required placeholder="••••••••" class="ar-input w-full pl-10 pr-4 py-3 rounded-lg text-sm sm:text-base">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 bg-[#040D1A] border-gray-600 rounded text-[#C5922A] focus:ring-[#C5922A]">
                    <label for="remember-me" class="ml-2 block text-sm text-[#7A99BB]">
                        Se souvenir de cette session (2FA)
                    </label>
                </div>

                                <div id="errorMsg" class="hidden text-red-500 text-sm font-['Rajdhani'] uppercase tracking-widest font-bold text-center mt-2 p-3 bg-red-950/50 rounded-lg border border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.2)]">Identifiants incorrects ou serveur éteint.</div>
                <button type="submit" class="ar-btn w-full py-3.5 rounded-lg flex justify-center items-center gap-2 mt-4">
                    Authentification Sécurisée
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
            
            <div class="mt-8 text-center border-t border-[rgba(26,111,168,0.3)] pt-6">
                <p class="text-xs text-[#7A99BB]">
                    En vous connectant, vous acceptez de respecter le secret médical selon la législation nationale relative à la protection des données de santé.
                </p>
                <div class="flex items-center justify-center gap-2 mt-4 text-[#C5922A]">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    <span class="text-xs font-bold uppercase tracking-widest font-['Rajdhani']">Sécurisé de bout en bout</span>
                </div>
            </div>
        </div>
    </div>

    <!-- animations -->
    <style>
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Empêche le chargement de la page
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const btn = this.querySelector('button[type="submit"]');
            const errorMsg = document.getElementById('errorMsg');
            
            // État de chargement
            errorMsg.classList.add('hidden');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Vérification...`;
            
            try {
                // On va "frapper" à la Porte 8000
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    // Le serveur a validé le mot de passe (Statut 200 OK)
                    btn.innerHTML = `<svg class="w-5 h-5 inline mr-2 text-[#040D1A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Accès Autorisé !`;
                    btn.style.background = "#00FF9D";
                    btn.style.boxShadow = "0 0 25px rgba(0, 255, 157, 0.4)";
                    
                    // Sauvegarde une fausse preuve de connexion locale
                    localStorage.setItem('atlasrad_token', data.token);
                    
                    // On dirige gentiment le médecin vers le tableau de bord
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 800);
                } else {
                    // Le Python refuse (Mauvais identifiants)
                    errorMsg.innerText = "❌ " + (data.detail || 'Erreur de connexion');
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = originalText;
                }
                
            } catch (err) {
                // Le moteur Python est éteint (Serveur down !)
                errorMsg.innerText = "🔌 Erreur: Le moteur AtlasRad (Port 8000) semble éteint sur votre machine !";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
